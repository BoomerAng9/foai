server {
    listen 80;
    server_name grammar.aimanagedsolutions.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grammar.aimanagedsolutions.cloud;

    ssl_certificate /etc/letsencrypt/live/grammar.aimanagedsolutions.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grammar.aimanagedsolutions.cloud/privkey.pem;

    location / {
        proxy_pass http://localhost:3080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
