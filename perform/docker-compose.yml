services:
  perform:
    # Build context is the monorepo root (..) so the workspace deps
    # @aims/tie-matrix + @aims/spinner (and their transitive deps
    # @aims/pricing-matrix + @aims/pmo) resolve from aims-tools/*
    # during `npm ci`. Uses the canonical multi-stage Dockerfile that
    # Cloud Run also consumes — one build recipe for both surfaces.
    build:
      context: ..
      dockerfile: perform/Dockerfile.cloudrun
    restart: unless-stopped
    env_file: .env.local
    volumes:
      # Persist generated images outside the container so rebuilds don't wipe them
      - /opt/foai-data/perform/generated:/app/public/generated
      # GCP service account for Vertex AI (bills to your GCP credits)
      - /opt/foai-data/perform/secrets:/app/secrets:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perform.rule=Host(`perform.foai.cloud`)"
      - "traefik.http.routers.perform.entrypoints=websecure"
      - "traefik.http.routers.perform.tls.certresolver=letsencrypt"
      - "traefik.http.services.perform.loadbalancer.server.port=3000"
