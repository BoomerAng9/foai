# ============================================================================
# Per|Form — Cloud Build + Cloud Run deploy config
# ============================================================================
# Next.js 15 (App Router, standalone). Public web surface for the
# CFB/NFL draft-week rankings, SSE pick stream, /draft, /teams, /players.
#
# Why min-instances=1 / max-instances=1
#   The SSE event bus (src/lib/events/rankings-emitter.ts) is an in-process
#   Set<Subscriber>. emitPickEvent() on container A only reaches subscribers
#   on container A. Cross-container fanout requires a Redis pub/sub bridge
#   (post-draft work). Until that ships, pin the service to exactly one
#   warm container so every connected client sees every pick.
#
# Why timeout=3600s
#   SSE long-hold connections. Cloud Run default 300s would close /api/
#   rankings/stream every 5 minutes mid-draft.
#
# Why --no-cpu-throttling + --cpu-boost
#   SSE keeps idle connections open. CPU throttling between requests would
#   stall the heartbeat/keepalive write. Boost shortens cold-start if the
#   single instance is ever evicted.
#
# Demo-floor secret scope (2026-04-20):
#   Required for the public SSE/rankings/draft demo:
#     - DATABASE_URL              ← perform-database-url
#     - PIPELINE_AUTH_KEY         ← perform-pipeline-auth-key
#     - GEMINI_API_KEY            ← keystore-gemini-api-key
#     - OPENROUTER_API_KEY        ← keystore-openrouter-api-key
#     - ANTHROPIC_API_KEY         ← keystore-anthropic-api-key  (Managed Agents)
#     - ELEVENLABS_API_KEY        ← keystore-elevenlabs-api-key
#     - IDEOGRAM_API_KEY          ← keystore-ideogram-api-key
#     - RECRAFT_API_KEY           ← keystore-recraft-api-key
#     - BRAVE_API_KEY             ← keystore-brave-api-key
#   Deferred (features 503 until next-deploy migrates secrets):
#     - Firebase admin trio (login)
#     - NEXT_PUBLIC_FIREBASE_*    (build-time inlined)
#     - Stripe (billing)
#     - HeyGen, TwelveLabs, FAL, Kie, Async, Deepgram, Sqwaadrun
#
# Trigger (run from foai/ monorepo root — upload scope narrowed via
# perform/cloudbuild.gcloudignore so `file:../aims-tools/*` workspace deps
# resolve during `npm ci`):
#   gcloud builds submit \
#     --config=perform/cloudbuild.yaml \
#     --ignore-file=perform/cloudbuild.gcloudignore \
#     --substitutions="COMMIT_SHA=$(git rev-parse HEAD)" \
#     --project=foai-aims \
#     .
#
# Rollback:
#   gcloud run services update-traffic perform \
#     --to-revisions=<previous-revision>=100 \
#     --region=us-central1 --project=foai-aims
# ============================================================================

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/foai-aims/perform/service:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/foai-aims/perform/service:latest
      - -f
      - perform/Dockerfile
      - .

  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    args:
      - push
      - us-central1-docker.pkg.dev/foai-aims/perform/service:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args:
      - push
      - us-central1-docker.pkg.dev/foai-aims/perform/service:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - perform
      - --image=us-central1-docker.pkg.dev/foai-aims/perform/service:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=1
      - --timeout=3600s
      - --concurrency=80
      - --service-account=perform-sa@foai-aims.iam.gserviceaccount.com
      - --no-cpu-throttling
      - --cpu-boost
      - --set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1
      - --set-secrets=DATABASE_URL=perform-database-url:latest,PIPELINE_AUTH_KEY=perform-pipeline-auth-key:latest,GEMINI_API_KEY=keystore-gemini-api-key:latest,OPENROUTER_API_KEY=keystore-openrouter-api-key:latest,ANTHROPIC_API_KEY=keystore-anthropic-api-key:latest,ELEVENLABS_API_KEY=keystore-elevenlabs-api-key:latest,IDEOGRAM_API_KEY=keystore-ideogram-api-key:latest,RECRAFT_API_KEY=keystore-recraft-api-key:latest,BRAVE_API_KEY=keystore-brave-api-key:latest

images:
  - us-central1-docker.pkg.dev/foai-aims/perform/service:$COMMIT_SHA
  - us-central1-docker.pkg.dev/foai-aims/perform/service:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
