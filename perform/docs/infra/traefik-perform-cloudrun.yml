# ============================================================================
# perform.foai.cloud path-based carveout → perform-draft-2026 Cloud Run
# ============================================================================
# More-specific Host+PathPrefix rules beat the bare Host(\`perform.foai.cloud\`)
# docker router on perform-perform-1 (VPS container), so these paths serve
# from Cloud Run while everything else keeps routing to the VPS.
#
# /cr/* is the Cloud Run assetPrefix — Traefik strips the /cr prefix before
# forwarding, so Cloud Run receives /_next/... unchanged. The VPS perform
# container still owns /_next/... with its own build hashes; no collision.
# ============================================================================

http:
  routers:
    perform-cloudrun-draft:
      rule: "Host(`perform.foai.cloud`) && (PathPrefix(`/draft/`) || PathPrefix(`/api/draft/center/`))"
      service: perform-cloudrun
      entrypoints:
        - websecure
      priority: 100
      tls:
        certresolver: letsencrypt

    perform-cloudrun-nba:
      rule: "Host(`perform.foai.cloud`) && (PathPrefix(`/nba/`) || PathPrefix(`/api/nba/`))"
      service: perform-cloudrun
      entrypoints:
        - websecure
      priority: 100
      tls:
        certresolver: letsencrypt

    perform-cloudrun-assets:
      rule: "Host(`perform.foai.cloud`) && PathPrefix(`/cr/`)"
      service: perform-cloudrun
      entrypoints:
        - websecure
      priority: 110
      middlewares:
        - strip-cr-prefix
      tls:
        certresolver: letsencrypt

  middlewares:
    strip-cr-prefix:
      stripPrefix:
        prefixes:
          - /cr

  services:
    perform-cloudrun:
      loadBalancer:
        passHostHeader: false
        serversTransport: cloudrun-transport
        servers:
          - url: "https://perform-draft-2026-apbgyi35aq-uc.a.run.app"

  serversTransports:
    cloudrun-transport:
      insecureSkipVerify: false
