# Per|Form — Cloud Run service manifest
# =========================================
# Owner-approved deploy config (2026-04-20).
#
# Why maxInstances: "1"
#   The Per|Form SSE event bus (src/lib/events/rankings-emitter.ts) is an
#   in-process Set<Subscriber>. When /api/draft/pick fires emitPickEvent()
#   on container A, only subscribers connected to container A receive the
#   event. Cross-container fanout requires a Redis pub/sub (or Cloud
#   Pub/Sub) bridge which is post-draft work. Until that lands, the only
#   way to guarantee "every client sees every pick" is to pin the service
#   to exactly one container.
#
# Why minInstances: "1"
#   SSE connections are long-held. A cold-start mid-draft drops every
#   subscriber. Keeping one instance warm removes that failure mode.
#
# Why timeoutSeconds: 3600
#   SSE long-hold. Default 300s would cut /api/rankings/stream connections
#   every 5 minutes.
#
# Revisit trigger: Redis pub/sub bridge ships. Then maxInstances can grow.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: perform
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        autoscaling.knative.dev/minScale: "1"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      timeoutSeconds: 3600
      containerConcurrency: 80
      serviceAccountName: perform-sa@ai-managed-services.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/ai-managed-services/foai-aims/perform:latest
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            # Env vars populated from Secret Manager + project config.
            # DATABASE_URL, GEMINI_API_KEY, ELEVENLABS_API_KEY, PIPELINE_AUTH_KEY,
            # FIREBASE_PROJECT_ID, FIREBASE_PRIVATE_KEY, FIREBASE_CLIENT_EMAIL,
            # IDEOGRAM_API_KEY, RECRAFT_API_KEY, OPENROUTER_API_KEY all live in
            # Secret Manager; the deploy script (cloudbuild.yaml) wires them via
            # --set-secrets at gcloud run deploy time.
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          ports:
            - name: http1
              containerPort: 3000
