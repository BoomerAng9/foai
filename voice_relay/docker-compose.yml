services:
  voice:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8091
      - GOOGLE_KEY=${GOOGLE_KEY}
      - SCOUT_ANG_URL=${SCOUT_ANG_URL}
      - CONTENT_ANG_URL=${CONTENT_ANG_URL}
      - EDU_ANG_URL=${EDU_ANG_URL}
      - BIZ_ANG_URL=${BIZ_ANG_URL}
      - OPS_ANG_URL=${OPS_ANG_URL}
      - CFO_ANG_URL=${CFO_ANG_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voice-relay.rule=Host(`voice.foai.cloud`)"
      - "traefik.http.routers.voice-relay.entrypoints=websecure"
      - "traefik.http.routers.voice-relay.tls.certresolver=letsencrypt"
      - "traefik.http.services.voice-relay.loadbalancer.server.port=8091"
