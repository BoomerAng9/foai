name: Shield Policy — Verify

# Runs on pull requests and pushes that touch shield-policy, the
# Shield Division constraint YAMLs, or the YAML → Rust generator.
# Three always-gated steps + Kani proof discharge as a soft gate
# (Kani install cost is significant on fresh runners; tightening to
# required-pass is a follow-up once runtime cost is profiled).

on:
  push:
    branches: [main]
    paths:
      - "chicken-hawk/shield-policy/**"
      - "chicken-hawk/config/shield/**"
      - "chicken-hawk/config/shield_personas.yml"
      - "chicken-hawk/scripts/compile-shield-policy.py"
      - ".github/workflows/shield-policy.yml"
  pull_request:
    branches: [main]
    paths:
      - "chicken-hawk/shield-policy/**"
      - "chicken-hawk/config/shield/**"
      - "chicken-hawk/config/shield_personas.yml"
      - "chicken-hawk/scripts/compile-shield-policy.py"
      - ".github/workflows/shield-policy.yml"

concurrency:
  group: shield-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Always-gated: YAML drift + compile + runtime tests
  # ───────────────────────────────────────────────────────────────────
  verify:
    name: "Shield Policy — compile + test + YAML drift"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chicken-hawk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install "PyYAML>=6"

      - name: YAML → Rust drift gate
        # Fails if committed generated/*.rs doesn't match what the
        # generator would produce from current YAML. This is the
        # single most important check — it makes parallel maintenance
        # impossible.
        run: python scripts/compile-shield-policy.py --check

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: cargo check
        working-directory: chicken-hawk/shield-policy
        run: cargo check --all-targets

      - name: cargo test (runtime)
        working-directory: chicken-hawk/shield-policy
        run: cargo test --lib

  # ───────────────────────────────────────────────────────────────────
  # Soft-gated: Kani proof discharge
  # ───────────────────────────────────────────────────────────────────
  # Current coverage: 24 harnesses proving 22/22 YAML kani_properties.
  # Kani install + discharge is ~8-15 min on a cold runner. We run it
  # for every shield-policy-touching PR but allow it to fail so
  # toolchain hiccups don't block unrelated work. Flip
  # `continue-on-error: false` once Kani proves stable in this env.
  kani:
    name: "Shield Policy — Kani proof discharge (soft gate)"
    runs-on: ubuntu-latest
    needs: verify
    continue-on-error: true
    defaults:
      run:
        working-directory: chicken-hawk/shield-policy
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: cargo kani --features kani
        # Discharges all 24 proof harnesses. On failure, the soft
        # gate reports but doesn't block the PR. Graduate to required
        # once the runtime budget is understood (~15 min initial,
        # likely 5-7 min for incremental changes).
        run: cargo kani --features kani

      - name: Summary
        if: always()
        run: |
          echo "Kani discharge result above. Coverage: 24 harnesses, 22/22 YAML kani_properties covered."
          echo "The Paranoia proof (kani_paranoia_refuses_crypt_ang) is the most structurally important:"
          echo "  forall inv where hawk == LilDoubtHawk AND commander == CryptAng => Err(ProhibitedCommander)"
