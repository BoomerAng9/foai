# Taskade adapter — local-dev compose. Production wiring lands inside
# /docker/chicken-hawk/docker-compose.yml on myclaw-vps (separate ops PR).
# For local dev: docker compose up taskade-adapter

services:
  taskade-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskade-adapter:0.1.0
    container_name: taskade-adapter
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOG_LEVEL: info
      ADAPTER_PORT: 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Production deploy joins the chicken-hawk network so the gateway can
    # reach this service at http://taskade-adapter:8000. Local dev exposes
    # on host port 8000 for direct curl testing.
    networks:
      - taskade-adapter-local

networks:
  taskade-adapter-local:
    driver: bridge
