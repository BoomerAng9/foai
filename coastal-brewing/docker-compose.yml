services:
  coastal-runner:
    image: python:3.13-slim
    container_name: coastal-runner
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /app
    command: >
      bash -c "
        apt-get update && apt-get install -y --no-install-recommends curl &&
        pip install --no-cache-dir -r requirements.txt &&
        python -m uvicorn scripts.api_server:app --host 0.0.0.0 --port 8080 --log-level info
      "
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/app
    environment:
      COASTAL_GATEWAY_TOKEN: "${COASTAL_GATEWAY_TOKEN}"
      DATABASE_URL: "sqlite:///audit_ledger/coastal_brewing.db"
      ENVIRONMENT: "production"
      COMPANY_NAME: "Coastal Brewing"
      OWNER_APPROVAL_EMAIL: "${OWNER_APPROVAL_EMAIL}"
      TASKADE_ACCESS_TOKEN: "${TASKADE_ACCESS_TOKEN}"
      NVIDIA_API_KEY: "${NVIDIA_API_KEY:-}"
      NVIDIA_BASE_URL: "${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}"
      COASTAL_PUBLIC_URL: "${COASTAL_PUBLIC_URL:-https://brewing.foai.cloud}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_COASTAL_COFFEE_SUB_PRICE_ID: "${STRIPE_COASTAL_COFFEE_SUB_PRICE_ID:-}"
      STRIPE_COASTAL_TEA_SUB_PRICE_ID: "${STRIPE_COASTAL_TEA_SUB_PRICE_ID:-}"
      STRIPE_COASTAL_COMBO_SUB_PRICE_ID: "${STRIPE_COASTAL_COMBO_SUB_PRICE_ID:-}"
      NEMOCLAW_URL: "${NEMOCLAW_URL:-https://hawk.foai.cloud}"
      NEMOCLAW_API_KEY: "${NEMOCLAW_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      COASTAL_APPROVE_SECRET: "${COASTAL_APPROVE_SECRET:-}"
      TZ: "UTC"
    networks:
      - foai-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Wave 1 Step C (Path 1) — Hermes Agent (NousResearch).
  # Owner's INBOUND chat command surface: Telegram/Slack/Discord etc →
  # Hermes invokes chicken-hawk's /run, /check, /audit/{id} as registered
  # tools. Magic-link login stays on direct Telegram in chicken-hawk; this
  # is purely additive and reversible (`docker compose stop hermes`).
  #
  # Build context: upstream repo pinned to specific SHA (118k★ MIT, MIT,
  # pushed 2026-04-26). Compose pulls + builds on first `up`; the result
  # is a local image we control. No registry pull — the SHA pin is our
  # supply-chain guarantee.
  hermes:
    build:
      context: https://github.com/NousResearch/hermes-agent.git#9be83728a67c794daa20c553919f4869675a2edc
    image: hermes-agent:9be83728
    container_name: hermes
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Override upstream's `network_mode: host` default — we want bridge
    # so we can publish only the API server port to localhost, and so
    # Hermes can reach chicken-hawk via internal DNS on foai-internal.
    networks:
      - foai-internal
    ports:
      # API server localhost-only. nginx fronts it at hermes.foai.cloud
      # with mTLS; never expose 9119 publicly.
      - "127.0.0.1:9119:9119"
      # Dashboard stays SSH-tunnel-only per upstream guidance:
      #   ssh -L 9118:localhost:9118 aims-vps
      - "127.0.0.1:9118:9118"
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      # Enable the OpenAI-compatible API server so chicken-hawk tools
      # can be invoked from Hermes' chat handlers via HTTP. Without
      # API_SERVER_KEY set, the API stays bound to 127.0.0.1 only.
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "${HERMES_API_SERVER_KEY}"
      # Bearer used by Hermes' tool calls to authenticate against
      # chicken-hawk /run, /check, /audit. Reuses the existing token —
      # one secret to rotate, not two.
      CHICKEN_HAWK_BASE_URL: "https://hawk.foai.cloud"
      CHICKEN_HAWK_BEARER: "${CHICKEN_HAWK_BEARER}"
      # LLM provider — defaults to OpenRouter. Owner can swap to direct
      # Anthropic / OpenAI / local Ollama at any time without rebuild.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TZ: "UTC"
    command: ["gateway", "run"]
    depends_on:
      coastal-runner:
        condition: service_healthy
    # Process-alive healthcheck — checks the hermes gateway PID is running
    # without requiring interactive `hermes gateway setup` to have completed.
    # Why not /v1/models: upstream activates the API server only after the
    # operator runs the setup CLI, so the prior HTTP healthcheck failed in a
    # fresh deploy until setup. PID-based check passes on first start; the
    # operator can DM the bot once setup is registered to verify end-to-end.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes gateway' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  hermes-data:

networks:
  foai-internal:
    external: true
    name: foai-internal
