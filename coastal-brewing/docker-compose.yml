services:
  coastal-runner:
    image: python:3.13-slim
    container_name: coastal-runner
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /app
    command: >
      bash -c "
        apt-get update && apt-get install -y --no-install-recommends curl &&
        pip install --no-cache-dir -r requirements.txt &&
        python -m uvicorn scripts.api_server:app --host 0.0.0.0 --port 8080 --log-level info
      "
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/app
    environment:
      COASTAL_GATEWAY_TOKEN: "${COASTAL_GATEWAY_TOKEN}"
      DATABASE_URL: "sqlite:///audit_ledger/coastal_brewing.db"
      ENVIRONMENT: "production"
      COMPANY_NAME: "Coastal Brewing"
      OWNER_APPROVAL_EMAIL: "${OWNER_APPROVAL_EMAIL}"
      TASKADE_ACCESS_TOKEN: "${TASKADE_ACCESS_TOKEN}"
      NVIDIA_API_KEY: "${NVIDIA_API_KEY:-}"
      NVIDIA_BASE_URL: "${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}"
      COASTAL_PUBLIC_URL: "${COASTAL_PUBLIC_URL:-https://brewing.foai.cloud}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_COASTAL_COFFEE_SUB_PRICE_ID: "${STRIPE_COASTAL_COFFEE_SUB_PRICE_ID:-}"
      STRIPE_COASTAL_TEA_SUB_PRICE_ID: "${STRIPE_COASTAL_TEA_SUB_PRICE_ID:-}"
      STRIPE_COASTAL_COMBO_SUB_PRICE_ID: "${STRIPE_COASTAL_COMBO_SUB_PRICE_ID:-}"
      NEMOCLAW_URL: "${NEMOCLAW_URL:-https://hawk.foai.cloud}"
      NEMOCLAW_API_KEY: "${NEMOCLAW_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      COASTAL_APPROVE_SECRET: "${COASTAL_APPROVE_SECRET:-}"
      # Resend transactional email (post-approval supplier + customer sends).
      # If RESEND_API_KEY is empty, sends are skipped + recorded as 'skipped'
      # in AuditLedger — no fake completion. Set RESEND_FROM to the verified
      # brand domain once owner adds DNS records at Resend.
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM: "${RESEND_FROM:-Coastal Brewing <onboarding@resend.dev>}"
      # Where supplier wholesale orders go. Defaults to the owner approval
      # email so orders land where the owner can manually forward to Temecula
      # Coffee Roasters until the wholesale agreement is digitally signed
      # (Documenso, Wave 2 of Coastal).
      COASTAL_SUPPLIER_EMAIL: "${COASTAL_SUPPLIER_EMAIL:-${OWNER_APPROVAL_EMAIL}}"
      TZ: "UTC"
    networks:
      - foai-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Wave 1 Step C (Path 1) — Hermes Agent (NousResearch).
  # Owner's INBOUND chat command surface: Telegram/Slack/Discord etc →
  # Hermes invokes chicken-hawk's /run, /check, /audit/{id} as registered
  # tools. Magic-link login stays on direct Telegram in chicken-hawk; this
  # is purely additive and reversible (`docker compose stop hermes`).
  #
  # Build context: upstream repo pinned to specific SHA (118k★ MIT, MIT,
  # pushed 2026-04-26). Compose pulls + builds on first `up`; the result
  # is a local image we control. No registry pull — the SHA pin is our
  # supply-chain guarantee.
  hermes:
    build:
      context: https://github.com/NousResearch/hermes-agent.git#9be83728a67c794daa20c553919f4869675a2edc
    image: hermes-agent:9be83728
    container_name: hermes
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Override upstream's `network_mode: host` default — we want bridge
    # so we can publish only the API server port to localhost, and so
    # Hermes can reach chicken-hawk via internal DNS on foai-internal.
    networks:
      - foai-internal
    ports:
      # API server localhost-only. nginx fronts it at hermes.foai.cloud
      # with mTLS; never expose 9119 publicly.
      - "127.0.0.1:9119:9119"
      # Dashboard stays SSH-tunnel-only per upstream guidance:
      #   ssh -L 9118:localhost:9118 aims-vps
      - "127.0.0.1:9118:9118"
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_UID: "10000"
      HERMES_GID: "10000"
      # Enable the OpenAI-compatible API server so chicken-hawk tools
      # can be invoked from Hermes' chat handlers via HTTP. Without
      # API_SERVER_KEY set, the API stays bound to 127.0.0.1 only.
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "${HERMES_API_SERVER_KEY}"
      # Bearer used by Hermes' tool calls to authenticate against
      # chicken-hawk /run, /check, /audit. Reuses the existing token —
      # one secret to rotate, not two.
      CHICKEN_HAWK_BASE_URL: "https://hawk.foai.cloud"
      CHICKEN_HAWK_BEARER: "${CHICKEN_HAWK_BEARER}"
      # LLM provider — defaults to OpenRouter. Owner can swap to direct
      # Anthropic / OpenAI / local Ollama at any time without rebuild.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TZ: "UTC"
    command: ["gateway", "run"]
    depends_on:
      coastal-runner:
        condition: service_healthy
    # Process-alive healthcheck — checks the hermes gateway PID is running
    # without requiring interactive `hermes gateway setup` to have completed.
    # Why not /v1/models: upstream activates the API server only after the
    # operator runs the setup CLI, so the prior HTTP healthcheck failed in a
    # fresh deploy until setup. PID-based check passes on first start; the
    # operator can DM the bot once setup is registered to verify end-to-end.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'hermes gateway' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  paperclip-postgres:
    image: postgres:16-alpine
    container_name: paperclip-postgres
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: "${PAPERCLIP_POSTGRES_PASSWORD}"
      POSTGRES_DB: paperclip
      TZ: "UTC"
    volumes:
      - paperclip-postgres-data:/var/lib/postgresql/data
    networks:
      - foai-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Coastal AI workforce control plane. First pass is localhost-bound and
  # Paperclip-owned Postgres only; AuditLedger stays SQLite in coastal-runner.
  paperclip:
    build:
      context: https://github.com/paperclipai/paperclip.git#v2026.427.0
    image: paperclip:v2026.427.0
    container_name: paperclip
    restart: unless-stopped
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - paperclip-data:/paperclip
    environment:
      DATABASE_URL: "postgres://paperclip:${PAPERCLIP_POSTGRES_PASSWORD}@paperclip-postgres:5432/paperclip"
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_INSTANCE_ID: "coastal"
      PAPERCLIP_CONFIG: "/paperclip/instances/coastal/config.json"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-https://paperclip.foai.cloud}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_TELEMETRY_DISABLED: "1"
      DO_NOT_TRACK: "1"
      BETTER_AUTH_SECRET: "${PAPERCLIP_BETTER_AUTH_SECRET}"
      TZ: "UTC"
    networks:
      - foai-internal
    depends_on:
      paperclip-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3100/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Coastal storefront — Next.js 15 + React 19, standalone build.
  # Public-facing at brewing.foai.cloud (nginx terminates TLS and proxies to
  # 127.0.0.1:3010). The /api/order/intake route handler runs server-side
  # and forwards customer orders to coastal-runner /run with X-Coastal-Token
  # — the token never reaches the browser.
  coastal-web:
    build:
      context: ./web
    image: coastal-brewing-coastal-web
    container_name: coastal-web
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NODE_ENV: "production"
      # Bind IPv4 — Next.js standalone defaults to IPv6 :: which breaks the
      # IPv4 wget healthcheck. HOSTNAME=0.0.0.0 forces IPv4 server bind.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Same-origin browser fetches; nginx routes /api/* to coastal-runner.
      NEXT_PUBLIC_API_BASE: ""
      NEXT_PUBLIC_LIVELOOKIN_ENABLED: "${NEXT_PUBLIC_LIVELOOKIN_ENABLED:-true}"
      # Server-only — used by /api/order/intake route handler. Never exposed
      # to the browser. Same token coastal-runner expects on /run.
      COASTAL_GATEWAY_TOKEN: "${COASTAL_GATEWAY_TOKEN}"
      COASTAL_RUNNER_INTERNAL: "http://coastal-runner:8080"
      TZ: "UTC"
    networks:
      - foai-internal
    depends_on:
      coastal-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  hermes-data:
  paperclip-data:
  paperclip-postgres-data:

networks:
  foai-internal:
    external: true
    name: foai-internal
