services:
  acheevy-telegram:
    build: .
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ACHEEVY_V1_URL=${ACHEEVY_V1_URL:-http://31.97.138.45:8000}
      - ACHEEVY_V1_TOKEN=${ACHEEVY_V1_TOKEN}
      - ACHEEVY_MODEL=${ACHEEVY_MODEL:-google/gemini-3.1-flash}
