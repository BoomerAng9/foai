# ---------------------------------------------------------------------------
# Four interaction loops (v1.6 §4)
# ---------------------------------------------------------------------------

interaction_loops:

  identity_loop:
    purpose: "No action exists without legally valid, cryptographically signed identity."
    participants: [Lil_Salt_Hawk, Lil_Mast_Hawk, Lil_Script_Hawk]

  execution_loop:
    purpose: "Every action vetted against Syntax, Semantics, Privacy, Identity, Scope before execution."
    gates:
      - { gate: spinner_intercept,  owner: "Spinner (3-substrate consensus)" }
      - { gate: privacy_cost_check, owner: Lil_Seal_Hawk }
      - { gate: budget_check,       owner: Lil_Lock_Hawk }
      - { gate: policy_engine,      owner: Lil_Peel_Hawk }
      - { gate: canary_sat_check,   owner: Lil_Doubt_Hawk }
      - { gate: cia_tri_factor,     owner: [Lil_Mast_Hawk, Lil_Script_Hawk, Lil_Salt_Hawk, Lil_Peel_Hawk] }

  detection_loop:
    purpose: "Immediate, deterministic response following the Degradation Spectrum."
    flow:
      - Lil_Watch_Hawk
      - Lil_Wire_Hawk
      - Lil_Track_Hawk
      - Lil_Arc_Hawk
      - Lil_Omen_Hawk
      - Lil_Pulse_Hawk
      - Lil_Bell_Hawk
      - Lil_Patch_Hawk
      - Lil_Lab_Hawk

  audit_loop:
    purpose: "Mathematical, non-repudiable proof the Shield performed as promised."
    participants:
      chain_integrity: Lil_Lab_Hawk
      daily_root_anchor: Lil_Salt_Hawk
      zkp_broadcast: Lil_Veil_Hawk
      tenant_merkle_api: [Lil_Script_Hawk, Lil_Lock_Hawk]

