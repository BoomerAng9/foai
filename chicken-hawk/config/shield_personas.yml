# ---------------------------------------------------------------------------
# Cross-cutting refinements and advancements (v1.6)
# ---------------------------------------------------------------------------
# These point to which Hawks own each Autonomic Resilience invariant and
# technical advancement. Source-of-truth text in v1.6 directive.
# ---------------------------------------------------------------------------

autonomic_resilience:

  snr_throttling:                        # v1.6 §2.1 — Refinement A
    replaces: epsilon_backoff
    implementer: Lil_Seal_Hawk
    budget_custodian: Lil_Lock_Hawk
    telemetry_tagger: Lil_Wire_Hawk
    beneficiary: Lil_Track_Hawk
    critical_threshold_pct: 20
    tier_sampling:
      low_risk: 0.01
      medium_risk: 0.50
      high_risk: 1.00
    high_risk_epsilon_reduction:
      from: 0.1
      to: 0.01

  degradation_spectrum:                  # v1.6 §2.2 — Refinement B
    replaces: emergency_sync_shedding
    owner: Lil_Pulse_Hawk
    load_evaluator: Chicken_Hawk
    security_evaluator: Lil_Watch_Hawk
    adversary_confirmer: Lil_Doubt_Hawk
    mode_3_commander: Lil_Bell_Hawk
    modes: [nominal, congested, degraded, survival]
    tiered_consensus_in_degraded:
      low_risk: "1-instance syntactic"
      medium_risk: "2-of-3 syntactic"
      high_risk: "3-instance full + CIA"

  cia_tri_factor_intent:                 # v1.6 §2.3 — Refinement C
    replaces: confidence_score
    identity_key_manager: Lil_Mast_Hawk
    intent_token_source_owner: Lil_Script_Hawk
    playbook_signer: Lil_Salt_Hawk
    formal_verifier: Lil_Peel_Hawk
    factors:
      plan_signature: "hybrid ed25519 + ML-DSA by invoking Hawk"
      intent_token: "independent external source (change request / HITL / playbook / maintenance declaration)"
      scope_proof: "Merkle inclusion proof against tenant resource-inventory root, max 1h old"

technical_advancements:

  substrate_heterogeneity:               # v1.6 §3.1 — Advancement I
    build_verifier: Lil_Peel_Hawk
    per_target_signer: Lil_Salt_Hawk
    performance_monitor: Lil_Pulse_Hawk
    compromise_simulator: Lil_Doubt_Hawk
    substrates:
      primary: { os: "bare-metal Linux", arch: "x86_64" }
      observer_1: { os: "containerized macOS", arch: "ARM64" }
      observer_2: { runtime: "WASM", arch: "RISC-V" }

  zkp_threat_sharing:                    # v1.6 §3.2 — Advancement II
    zkp_generator: Lil_Seal_Hawk
    intel_curator: Lil_Omen_Hawk
    distributor: Lil_Veil_Hawk
    rule_translator: Lil_Chord_Hawk
    proof_system: "zk-SNARKs or zk-STARKs"

  phoenix_protocol:                      # v1.6 §3.3 — Advancement III
    deployer: Lil_Patch_Hawk
    golden_image_signer: Lil_Salt_Hawk
    rebirth_integrity_validator: Lil_Lab_Hawk
    cadence_monitor: Lil_Doubt_Hawk
    ttl_hours: 24
    staggered: true
    graceful_handoff: true

