services:
  nemoclaw:
    image: python:3.13-slim
    container_name: nemoclaw
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /app
    command: >
      bash -c "
        apt-get update && apt-get install -y --no-install-recommends curl &&
        pip install --no-cache-dir -r requirements.txt &&
        python -m uvicorn main:app --host 0.0.0.0 --port 8081 --log-level info
      "
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - .:/app
      - ./data:/data
    environment:
      NEMOCLAW_API_KEY: "${NEMOCLAW_API_KEY}"
      NEMOCLAW_DATA_DIR: "/data"
      PORT: "8081"
      ENV: "production"
      TZ: "UTC"
    networks:
      - foai-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  foai-internal:
    external: true
    name: foai-internal
