# ============================================================================
# Hermes LearnAng V0.5 — Cloud Build + Cloud Run deploy config
# ============================================================================
# FastAPI service. ApiKeyMiddleware-gated. Deep Think evaluation engine,
# multi-model consensus scoring, daily + weekly scheduler.
#
# Secrets pulled from Secret Manager at container boot:
#   - HERMES_API_KEY         → required; hermes-api-key
#   - OPENROUTER_API_KEY     → required; keystore-openrouter-api-key
#
# Trigger:
#   gcloud builds submit \
#     --config=runtime/hermes/cloudbuild.yaml \
#     --substitutions="COMMIT_SHA=$(git rev-parse HEAD)" \
#     --project=foai-aims \
#     runtime/hermes/
#
# Rollback:
#   gcloud run services update-traffic hermes \
#     --to-revisions=<previous-revision>=100 \
#     --region=us-central1 --project=foai-aims
# ============================================================================

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/foai-aims/hermes/service:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/foai-aims/hermes/service:latest
      - -f
      - runtime/hermes/Dockerfile
      - .

  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    args:
      - push
      - us-central1-docker.pkg.dev/foai-aims/hermes/service:$COMMIT_SHA

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args:
      - push
      - us-central1-docker.pkg.dev/foai-aims/hermes/service:latest

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hermes
      - --image=us-central1-docker.pkg.dev/foai-aims/hermes/service:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=300s
      - --set-env-vars=PYTHONUNBUFFERED=1,GCP_PROJECT=foai-aims,DEFAULT_TENANT=cti,ENV=production
      - --set-secrets=HERMES_API_KEY=hermes-api-key:latest,OPENROUTER_API_KEY=keystore-openrouter-api-key:latest

images:
  - us-central1-docker.pkg.dev/foai-aims/hermes/service:$COMMIT_SHA
  - us-central1-docker.pkg.dev/foai-aims/hermes/service:latest

options:
  logging: CLOUD_LOGGING_ONLY
