# Cloud Run service definition for vault-signer.
# Applied via: gcloud run services replace runtime/vault-signer/service.yaml
#
# Matches the Gate 6b deploy pattern from foai:
#   - foai-aims project / us-central1 region
#   - Artifact Registry image pushed by cloudbuild.yaml
#   - Service account binds to the least-privilege KMS-signer role
#
# NO --allow-unauthenticated. The sidecar validates ID tokens in-band
# via the auth.py module; Cloud Run's invoker IAM is the outer gate
# that blocks unauthenticated requests from reaching the container
# at all. Defense-in-depth.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: vault-signer
  namespace: foai-aims
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 8
      timeoutSeconds: 30
      serviceAccountName: vault-signer@foai-aims.iam.gserviceaccount.com
      containers:
        - name: vault-signer
          image: us-central1-docker.pkg.dev/foai-aims/vault-signer/vault-signer:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: VAULT_SIGNER_AUDIENCE
              # Cloud Run exposes the service URL as a template var at
              # deploy time via gcloud --set-env-vars. Update after
              # first deploy when the URL is known.
              value: "https://vault-signer-REPLACE-WITH-HASH-uc.a.run.app"
            - name: VAULT_SIGNER_ALLOWED_CALLERS
              value: "cloud-build@foai-aims.iam.gserviceaccount.com"
            - name: VAULT_SIGNER_GCP_PROJECT
              value: "foai-aims"
            - name: VAULT_SIGNER_GCP_LOCATION
              value: "us-central1"
            - name: VAULT_SIGNER_GCP_KEYRING
              value: "shield-policy"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
