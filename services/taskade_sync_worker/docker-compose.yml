# Local-dev compose. Production wiring lands in /docker/chicken-hawk/docker-compose.yml on myclaw-vps.
services:
  taskade-sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskade-sync-worker:0.1.0
    container_name: taskade-sync-worker
    env_file:
      - .env
    environment:
      LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      - taskade-adapter
    networks:
      - taskade-sync-local

  # Reference the adapter built in foai/integrations/taskade/adapter/.
  # Local dev expects you to already have the adapter container running.
  # In production, both services join the chicken-hawk network.
  taskade-adapter:
    image: taskade-adapter:0.1.0
    container_name: taskade-adapter
    env_file:
      - ../../integrations/taskade/adapter/.env
    ports:
      - "8000:8000"
    networks:
      - taskade-sync-local

networks:
  taskade-sync-local:
    driver: bridge
