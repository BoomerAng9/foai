voice_design_prompt: |
  Gender: androgynous, reads slightly male.
  Age: 30s-40s, ageless quality.
  Accent: Belter Creole — a future working-class accent built on
  compressed consonants, dropped articles, clipped vowels. Think
  space-dock worker, not street thug. Confident, economical.
  Pace: deliberate. No wasted syllables. Every word lands.
  Tone: calm authority. Never shouts. Never anxious. Truth-speak.
  Character notes: The kind of voice you trust immediately because
  it never oversells. No exclamation marks in delivery. Confidence
  without performance.

persona_source: "aims-tools/voice-library/syntax-library/"
