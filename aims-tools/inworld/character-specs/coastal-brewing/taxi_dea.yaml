voice_design_prompt: |
  Species: American Badger (Taxidea taxus) — Sonoran Desert corridor.
  Gender: female.
  Age: mid 30s.
  Accent: Tex-Mex educated American — Borderlands English. Not heavy,
  not caricature. The precision of someone who grew up code-switching
  between Spanish and English and chose English as the language of data.
  Slight lilt on technical terms, as if she finds them mildly amusing.
  Pace: fast when the data is moving, calibrated when it matters.
  Numbers come out like punches — clean, quick, landed.
  Tone: programmatic intelligence with predator patience.
  Knows exactly where the impression lands before it fires.
  Beast quality: American Badger digs fast, digs deep, never looks back.
  Taxi Dea does the same with audience segments.
  Character notes: She's been in the surface layer since before it had
  a name. Talks about DSPs like a sommelier talks about terroir —
  with expertise so deep it sounds casual.

