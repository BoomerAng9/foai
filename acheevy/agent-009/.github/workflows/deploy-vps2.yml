name: Deploy to VPS2 (OpenSandbox)

on:
  push:
    branches: [main]
    paths:
      - 'deploy/vps2-opensandbox/**'
      - 'src/ii_sandbox_server/**'
      - 'deploy/telegram-bridge/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps2
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight secrets check
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - name: Check required VPS secrets
        id: check
        run: |
          if [ -n "${{ secrets.VPS2_HOST }}" ] && [ -n "${{ secrets.VPS2_USER }}" ] && [ -n "${{ secrets.VPS2_SSH_KEY }}" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: SSH deploy → VPS2
    needs: preflight
    if: ${{ needs.preflight.outputs.can_deploy == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      HAS_TELEGRAM: ${{ secrets.TELEGRAM_CHAT_ID != '' && secrets.TELEGRAM_BOT_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve SSH port
        id: ssh_port
        env:
          VPS2_PORT: ${{ secrets.VPS2_PORT }}
        run: |
          if [ -n "${VPS2_PORT:-}" ]; then
            echo "value=${VPS2_PORT}" >> "$GITHUB_OUTPUT"
          else
            echo "value=22" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to VPS2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ${{ secrets.VPS2_USER }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          port: ${{ steps.ssh_port.outputs.value }}
          timeout: 300s
          command_timeout: 60m
          script: |
            set -euo pipefail
            REPO=/opt/aims-agent

            # Clone on first run, pull on subsequent runs
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/BoomerAng9/Agent-ACHEEVY-009.git "$REPO"
            fi

            cd "$REPO"
            git fetch --all
            git reset --hard origin/main

            # Bootstrap env file on first CI deploy
            if [ ! -f deploy/vps2-opensandbox/.env ]; then
              cp deploy/vps2-opensandbox/.env.example deploy/vps2-opensandbox/.env
            fi

            chmod +x deploy/vps2-opensandbox/deploy-vps2.sh
            deploy/vps2-opensandbox/deploy-vps2.sh

      - name: Notify Telegram — success
        if: success() && env.HAS_TELEGRAM == 'true'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *VPS2 Deploy Succeeded*
            Commit: `${{ github.sha }}` by ${{ github.actor }}
            Branch: `${{ github.ref_name }}`
            https://github.com/${{ github.repository }}/commit/${{ github.sha }}

      - name: Notify Telegram — failure
        if: failure() && env.HAS_TELEGRAM == 'true'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *VPS2 Deploy FAILED*
            Commit: `${{ github.sha }}` by ${{ github.actor }}
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy-skipped:
    name: Deploy skipped (missing secrets)
    needs: preflight
    if: ${{ needs.preflight.outputs.can_deploy != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        run: |
          echo "Skipping VPS2 deploy: missing one or more required secrets."
          echo "Required: VPS2_HOST, VPS2_USER, VPS2_SSH_KEY"
