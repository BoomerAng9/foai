# =============================================================================
# A.I.M.S. VPS2 nginx — Reverse proxy for plug instances and OpenSandbox
# Host: srv1318308.hstgr.cloud / 31.97.138.45
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Load per-plug upstream configs written by plug-engine
    include /etc/nginx/plugs/*.conf;

    # Include vhost configs
    include /etc/nginx/conf.d/*.conf;
}
